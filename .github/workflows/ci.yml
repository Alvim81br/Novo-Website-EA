# Valida o build do site em cada push e PR.
# O deploy de produção é feito pela Netlify via integração Git (netlify.toml).
name: CI

on:
  push:
    branches: [claude/brave-brahmagupta-5mrl70, main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
