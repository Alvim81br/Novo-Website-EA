# Deploy de preview no GitHub Pages.
# O site de produção (www.englishacademybr.com) usará Netlify/Vercel via netlify.toml.
name: Deploy Preview (GitHub Pages)

on:
  push:
    branches: [claude/brave-brahmagupta-5mrl70, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # GitHub Pages serve o site em /Novo-Website-EA/, então os links
      # absolutos precisam do prefixo do repositório (apenas no preview).
      - name: Prefixar URLs absolutas com o base path do repositório
        run: |
          find dist -name '*.html' -print0 | xargs -0 sed -i 's|href="/|href="/Novo-Website-EA/|g; s|src="/|src="/Novo-Website-EA/|g'
          find dist -name '*.css' -print0 | xargs -0 sed -i 's|url(/|url(/Novo-Website-EA/|g'
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
